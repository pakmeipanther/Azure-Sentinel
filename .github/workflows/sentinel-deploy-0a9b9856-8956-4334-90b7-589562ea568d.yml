name: Deploy Content to sentinel-training-ws [0a9b9856-8956-4334-90b7-589562ea568d]
# Note: This workflow will deploy everything in the root directory.
# To deploy content only from a specific path (for example SentinelContent):
#   1. Add the target path to the "paths" property like such
#    paths:
#    - 'SentinelContent/**'
#    - '!.github/workflows/**'
#    - '.github/workflows/sentinel-deploy-0a9b9856-8956-4334-90b7-589562ea568d.yml'
#   2. Append the path to the directory environment variable below
#       directory: '${{ github.workspace }}/SentinelContent'

on:
  push:
    branches: [ main ]
    paths:
    - 'Solutions/Training/Azure-Sentinel-Training-Lab/**'
    - '!Azure-Sentinel/.script/**'
    - '!Azure-Sentinel/.github/**'



jobs:
  deploy-content:
    runs-on: windows-latest
    env:
      resourceGroupName: 'rg-sentinel-training-lab'
      workspaceName: 'sentinel-training-ws'
      workspaceId: 'e27ed6ff-0af3-439d-8f01-708165f38994'
      directory: '${{ github.workspace }}'
      cloudEnv: 'AzureCloud'
      contentTypes: 'AnalyticsRule,AutomationRule,HuntingQuery,Parser,Playbook,Workbook,Watchlist'
      branch: 'main'
      sourceControlId: '0a9b9856-8956-4334-90b7-589562ea568d'
      rootDirectory: '${{ github.workspace }}'
      githubAuthToken: ${{ secrets.GITHUB_TOKEN }}
      smartDeployment: 'true'
    permissions:
      contents: write
      id-token: write # Require write permission to Fetch an OIDC token.

    steps:
    - name: Login to Azure (Attempt 1)
      continue-on-error: true
      id: login1
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_0a9b98568956433490b7589562ea568d }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_0a9b98568956433490b7589562ea568d }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_0a9b98568956433490b7589562ea568d }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 1 failed
      if: ${{ steps.login1.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 2)
      continue-on-error: true
      id: login2
      uses: azure/login@v2
      if: ${{ steps.login1.outcome=='failure' }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_0a9b98568956433490b7589562ea568d }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_0a9b98568956433490b7589562ea568d }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_0a9b98568956433490b7589562ea568d }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 2 failed
      if: ${{ steps.login2.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 3)
      continue-on-error: false
      id: login3
      uses: azure/login@v2
      if: ${{ steps.login2.outcome=='failure'  }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_0a9b98568956433490b7589562ea568d }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_0a9b98568956433490b7589562ea568d }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_0a9b98568956433490b7589562ea568d }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Checkout
      uses: actions/checkout@v3

    - name: Deploy Content to Microsoft Sentinel
      uses: azure/powershell@v2
      with:
        azPSVersion: 'latest'
        inlineScript: |
          ${{ github.workspace }}//.github/workflows/azure-sentinel-deploy-0a9b9856-8956-4334-90b7-589562ea568d.ps1
